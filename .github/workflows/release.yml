name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "temp-password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp-password" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp-password" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build arm64
        run: |
          chmod +x scripts/build-release.sh
          bash scripts/build-release.sh ${{ steps.version.outputs.VERSION }} arm64
          mv DropConvert-${{ steps.version.outputs.VERSION }}-arm64.zip DropConvert-arm64.zip

      - name: Build x86_64
        run: |
          bash scripts/build-release.sh ${{ steps.version.outputs.VERSION }} x86_64
          mv DropConvert-${{ steps.version.outputs.VERSION }}-x86_64.zip DropConvert-x86_64.zip

      - name: Create universal binary
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          rm -rf DropConvert.app
          mkdir -p DropConvert.app/Contents/MacOS
          mkdir -p DropConvert.app/Contents/Resources
          lipo -create \
            .build/arm64-apple-macosx/release/DropConvert \
            .build/x86_64-apple-macosx/release/DropConvert \
            -output DropConvert.app/Contents/MacOS/DropConvert
          sed "s/1.0.0/${{ steps.version.outputs.VERSION }}/g" \
            Info.plist > DropConvert.app/Contents/Info.plist
          # Copy the SPM resource bundle into Contents/Resources so Bundle.module finds it
          # and codesign --deep can seal it (files at bundle root cause "unsealed contents" error)
          RESOURCE_BUNDLE=".build/arm64-apple-macosx/release/DropConvert_DropConvert.bundle"
          if [ -d "$RESOURCE_BUNDLE" ]; then
            cp -r "$RESOURCE_BUNDLE" "DropConvert.app/Contents/Resources/DropConvert_DropConvert.bundle"
          else
            echo "Warning: resource bundle not found at $RESOURCE_BUNDLE"
          fi
          # Copy app icon and menubar icons directly into Contents/Resources
          # so Bundle.main finds them as a fallback even if the nested bundle lookup fails
          cp Sources/DropConvert/Resources/AppIcon.icns DropConvert.app/Contents/Resources/AppIcon.icns
          cp Sources/DropConvert/Resources/menubar-icon-light.png DropConvert.app/Contents/Resources/menubar-icon-light.png
          cp Sources/DropConvert/Resources/menubar-icon-dark.png DropConvert.app/Contents/Resources/menubar-icon-dark.png

      - name: Sign app
        env:
          APPLE_TEAM_NAME: ${{ secrets.APPLE_TEAM_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          TEAM_NAME=$(echo "$APPLE_TEAM_NAME" | tr -d '\n\r')
          TEAM_ID=$(echo "$APPLE_TEAM_ID" | tr -d '\n\r')
          codesign --deep --force --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application: ${TEAM_NAME} (${TEAM_ID})" \
            DropConvert.app
          codesign --verify --verbose DropConvert.app

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent DropConvert.app DropConvert-notarize.zip
          xcrun notarytool submit DropConvert-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple DropConvert.app
          rm DropConvert-notarize.zip

      - name: Package signed app
        run: |
          ditto -c -k --keepParent DropConvert.app DropConvert.zip

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -r DropConvert.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "DropConvert" -srcfolder dmg_contents -ov -format UDZO DropConvert.dmg
          rm -rf dmg_contents

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit DropConvert.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple DropConvert.dmg

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(shasum -a 256 DropConvert.dmg | awk '{print $1}')
          VERSION=${{ steps.version.outputs.VERSION }}
          git clone https://x-access-token:${GH_TOKEN}@github.com/mpotter2002/homebrew-tap.git /tmp/homebrew-tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" /tmp/homebrew-tap/Casks/dropconvert.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" /tmp/homebrew-tap/Casks/dropconvert.rb
          cd /tmp/homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/dropconvert.rb
          git commit -m "Update DropConvert to v${VERSION}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DropConvert ${{ github.ref_name }}
          body: |
            ## DropConvert ${{ github.ref_name }}

            ### Install
            **Direct download:** grab `DropConvert.dmg` below — open it and drag DropConvert to Applications (universal binary, signed & notarized).

            **curl:**
            ```bash
            curl -fsSL https://dropconvert.vercel.app/install.sh | bash
            ```

            ### What's new
            See commit history for changes.

            ### Requirements
            macOS 14 (Sonoma) or later
          files: |
            DropConvert.dmg
            DropConvert.zip
            DropConvert-arm64.zip
            DropConvert-x86_64.zip
